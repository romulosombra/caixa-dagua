<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Caixa D'Água</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{

  width:100vw;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  background:linear-gradient(135deg,#0f172a,#1e293b);

  color:white;
}

.card{

  width:420px;

  padding:40px;

  border-radius:25px;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(10px);

  text-align:center;

  box-shadow:0 0 30px rgba(0,0,0,0.3);
}

.titulo{

  font-size:2rem;

  margin-bottom:30px;
}

.valor{

  font-size:7rem;

  font-weight:bold;

  color:#38bdf8;
}

.status-agua{

  margin-top:20px;

  font-size:2rem;

  font-weight:bold;
}

.conexao{

  margin-top:20px;

  opacity:0.7;
}

</style>

</head>
<body>

<div class="card">

<div class="titulo">
Caixa D'Água
</div>

<div class="valor" id="porcentagem">
--
</div>

<div style="font-size:2rem;">
%
</div>

<div class="status-agua" id="mensagem">
Aguardando dados...
</div>

<div class="conexao" id="status">
Conectando MQTT...
</div>

</div>

<script>

const porcentagem =
document.getElementById("porcentagem");

const mensagem =
document.getElementById("mensagem");

const statusText =
document.getElementById("status");

const client =
mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

client.on('connect', () => {

  statusText.innerHTML = "Conectado";

  client.subscribe('estacio/trabalho/caixadagua');

});

client.on('message', (topic, message) => {

  let valor =
  parseFloat(message.toString());

  valor = Math.round(valor);

  porcentagem.innerHTML = valor;

  if(valor >= 90){

    mensagem.innerHTML = "Cheio";

  }
  else if(valor >= 50){

    mensagem.innerHTML = "Meio cheio";

  }
  else if(valor >= 20){

    mensagem.innerHTML = "Meio vazio";

  }
  else if(valor >= 2){

    mensagem.innerHTML = "Quase vazio";

  }
  else{

    mensagem.innerHTML = "Vazio";

  }

});

client.on('error', () => {

  statusText.innerHTML = "Erro de conexão";

});

</script>

</body>
</html>
