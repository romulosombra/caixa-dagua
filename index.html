<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento de Caixa D'Água</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#0f172a,#1e293b);

    color:white;

    padding:20px;
}

.card{

    width:550px;

    padding:30px;

    border-radius:25px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    text-align:center;

    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.titulo{

    font-size:2rem;

    margin-bottom:25px;

    font-weight:bold;
}

.tanque{

    width:180px;
    height:250px;

    margin:0 auto 25px auto;

    border:5px solid white;

    border-radius:20px;

    position:relative;

    overflow:hidden;

    background:rgba(255,255,255,0.05);
}

.agua{

    position:absolute;

    bottom:0;

    width:100%;

    height:0%;

    background:linear-gradient(
        to top,
        #0284c7,
        #38bdf8
    );

    transition:height 1s ease;
}

.agua::before{

    content:"";

    position:absolute;

    top:-10px;

    left:0;

    width:200%;

    height:20px;

    background:rgba(255,255,255,0.3);

    border-radius:50%;

    animation:onda 3s linear infinite;
}

@keyframes onda{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-50%);
    }

}

.valor{

    font-size:5rem;

    font-weight:bold;

    color:#38bdf8;
}

.status-agua{

    margin-top:10px;

    font-size:1.8rem;

    font-weight:bold;
}

.conexao{

    margin-top:20px;

    opacity:0.8;

    font-size:0.9rem;
}

.rodape{

    margin-top:15px;

    opacity:0.6;

    font-size:0.8rem;
}

.sugestoes{

    margin-top:25px;

    padding:20px;

    border-radius:15px;

    background:rgba(255,255,255,0.05);

    text-align:left;
}

.sugestoes h3{

    text-align:center;

    margin-bottom:15px;
}

#litros{

    text-align:center;

    font-size:1.4rem;

    font-weight:bold;

    margin-bottom:15px;

    color:#38bdf8;
}

.item{

    margin-bottom:12px;

    font-size:1rem;
}

.item span{

    font-weight:bold;

    color:#38bdf8;
}

</style>

</head>

<body>

<div class="card">

    <div class="titulo">
        Monitoramento de Caixa D'Água
    </div>

    <div class="tanque">

        <div class="agua" id="agua"></div>

    </div>

    <div class="valor" id="porcentagem">
        --
    </div>

    <div style="font-size:1.5rem;">
        %
    </div>

    <div class="status-agua" id="mensagem">
        Aguardando dados...
    </div>

    <div class="conexao" id="status">
        Conectando ao MQTT...
    </div>

    <div class="rodape">
        Projeto IoT - Estácio
    </div>

    <div class="sugestoes">

        <h3>Capacidade Atual</h3>

        <div id="litros">
            --
        </div>

        <div class="item">
            🚿 Banhos possíveis:
            <span id="banhos">--</span>
        </div>

        <div class="item">
            👕 Lavagens de roupa:
            <span id="roupa">--</span>
        </div>

        <div class="item">
            🍽️ Lavagens de louça:
            <span id="louca">--</span>
        </div>

        <div class="item">
            🚽 Descargas:
            <span id="descarga">--</span>
        </div>

    </div>

</div>

<script>

const porcentagem =
document.getElementById("porcentagem");

const mensagem =
document.getElementById("mensagem");

const statusText =
document.getElementById("status");

const agua =
document.getElementById("agua");

const litrosDiv =
document.getElementById("litros");

const banhosDiv =
document.getElementById("banhos");

const roupaDiv =
document.getElementById("roupa");

const loucaDiv =
document.getElementById("louca");

const descargaDiv =
document.getElementById("descarga");

const client =
mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

client.on('connect', () => {

    statusText.innerHTML =
    "🟢 Conectado ao broker MQTT";

    client.subscribe(
    'estacio/trabalho/caixadagua'
    );

});

client.on('message', (topic, message) => {

    let valor =
    parseFloat(message.toString());

    valor = Math.round(valor);

    if(valor > 100) valor = 100;
    if(valor < 0) valor = 0;

    porcentagem.innerHTML = valor;

    agua.style.height =
    valor + "%";

    const litros =
    Math.round((valor / 100) * 1000);

    litrosDiv.innerHTML =
    litros + " litros disponíveis";

    banhosDiv.innerHTML =
    Math.floor(litros / 75);

    roupaDiv.innerHTML =
    Math.floor(litros / 150);

    loucaDiv.innerHTML =
    Math.floor(litros / 15);

    descargaDiv.innerHTML =
    Math.floor(litros / 12);

    if(valor >= 90){

        mensagem.innerHTML =
        "Cheio";

        agua.style.background =
        "linear-gradient(to top,#0284c7,#38bdf8)";

    }
    else if(valor >= 50){

        mensagem.innerHTML =
        "Meio cheio";

        agua.style.background =
        "linear-gradient(to top,#0284c7,#38bdf8)";

    }
    else if(valor >= 20){

        mensagem.innerHTML =
        "Meio vazio";

        agua.style.background =
        "linear-gradient(to top,#eab308,#fde047)";

    }
    else if(valor >= 2){

        mensagem.innerHTML =
        "Quase vazio";

        agua.style.background =
        "linear-gradient(to top,#f97316,#fb923c)";

    }
    else{

        mensagem.innerHTML =
        "Vazio";

        agua.style.background =
        "linear-gradient(to top,#dc2626,#ef4444)";

    }

});

client.on('error', () => {

    statusText.innerHTML =
    "🔴 Erro de conexão";

});

client.on('close', () => {

    statusText.innerHTML =
    "🟠 Desconectado";

});

</script>

</body>
</html>
